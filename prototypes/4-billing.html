/* ============================================================
   Primitives
   ============================================================ */
const Button = ({
  variant = 'solid', color = 'primary', size,
  disabled, loading, fullWidth, iconOnly,
  leadingContent, trailingContent, children, ...rest
}) => {
  const resolvedSize = size || (fullWidth ? 'large' : 'medium');
  const sizeMap = {
    small: { h: 32, px: 14, py: 7, fs: 13, fw: 600, radius: 8, gap: 4, icon: 16, iconPad: 7 },
    medium: { h: 40, px: 20, py: 9, fs: 15, fw: 600, radius: 10, gap: 5, icon: 18, iconPad: 10 },
    large: { h: 48, px: 28, py: 12, fs: 16, fw: 600, radius: 12, gap: 6, icon: 20, iconPad: 12 },
  }[resolvedSize];

  const getBg = () => {
    if (disabled) return 'var(--interaction-disable)';
    if (variant === 'outlined') return 'transparent';
    if (color === 'assistive') {
      return resolvedSize === 'large' ? 'var(--fill-strong)' : 'var(--fill-normal)';
    }
    return 'var(--primary-normal)';
  };
  const getFg = () => {
    if (disabled) return 'var(--label-assistive)';
    if (variant === 'outlined' && color === 'primary') return 'var(--primary-normal)';
    if (variant === 'outlined') return 'var(--label-normal)';
    if (color === 'assistive') return 'var(--label-neutral)';
    return 'var(--static-white)';
  };

  const style = {
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    gap: sizeMap.gap, fontFamily: 'var(--font-family-base)',
    fontSize: sizeMap.fs, fontWeight: color === 'assistive' ? 500 : sizeMap.fw,
    height: iconOnly ? 'auto' : sizeMap.h, boxSizing: 'border-box',
    padding: iconOnly ? sizeMap.iconPad : `0 ${sizeMap.px}px`,
    borderRadius: sizeMap.radius, border: 0, cursor: disabled ? 'default' : 'pointer',
    background: getBg(), color: getFg(),
    width: fullWidth ? '100%' : 'fit-content',
    boxShadow: variant === 'outlined' ? 'inset 0 0 0 1px var(--line-normal-neutral)' : 'none',
    backdropFilter: color === 'assistive' && variant === 'solid' ? 'blur(32px)' : 'none',
    letterSpacing: resolvedSize === 'small' ? '0.0145em' : '0.0096em',
    transition: 'background var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard)',
    position: 'relative', whiteSpace: 'nowrap',
    opacity: loading ? 0.9 : 1,
  };
  return (
    <button className={disabled ? undefined : 'wds-pressable'} style={style} disabled={disabled} {...rest}>
      {leadingContent}
      {!iconOnly ? <span>{children}</span> : children}
      {trailingContent}
    </button>
  );
};

const Chip = ({ size = 'medium', variant = 'default', leading, onClick, children }) => {
  const sizeMap = {
    medium: { py: 7, px: 11, fs: 'var(--fs-label1)', lh: 'var(--lh-label1)' },
    small:  { py: 6, px:  8, fs: 'var(--fs-label1)', lh: 'var(--lh-label1)' },
    xs:     { py: 4, px:  7, fs: 'var(--fs-caption1)', lh: 'var(--lh-caption1)' },
  }[size];
  const variantMap = {
    default:  { bg: 'var(--fill-alternative)',         fg: 'var(--label-neutral)' },
    primary:  { bg: 'var(--bg-primary-soft)',          fg: 'var(--primary-normal)' },
    positive: { bg: 'var(--bg-status-positive-soft)',  fg: 'var(--accent-fg-green)' },
    negative: { bg: 'var(--bg-status-negative-soft)',  fg: 'var(--accent-fg-red)' },
  }[variant] || { bg: 'var(--fill-alternative)', fg: 'var(--label-neutral)' };
  const style = {
    display: 'inline-flex', alignItems: 'center', gap: 4,
    padding: `${sizeMap.py}px ${sizeMap.px}px`, borderRadius: 8,
    fontFamily: 'var(--font-family-base)',
    fontSize: sizeMap.fs, lineHeight: sizeMap.lh, fontWeight: 500,
    cursor: onClick ? 'pointer' : 'default', border: 0, whiteSpace: 'nowrap',
    background: variantMap.bg, color: variantMap.fg,
  };
  return <button style={style} onClick={onClick} className={onClick ? 'wds-pressable' : undefined}>{leading}{children}</button>;
};

const Badge = ({ color = 'primary', children }) => {

    positive:   ['var(--bg-status-positive-soft)',   'var(--accent-fg-green)'],

    primary:    ['var(--blue-95)',                   'var(--primary-normal)'],
    violet:     ['var(--bg-accent-violet-soft)',     'var(--accent-fg-violet)'],

  const [bg, fg] = map[color] || map.primary;
  return <span style={{
    display: 'inline-flex', alignItems: 'center', gap: 4,
    padding: '4px 7px', borderRadius: 8, fontSize: 12, fontWeight: 600,

/* ============================================================
   AnimatedNumber (used by screens below)
   ============================================================ */
function AnimatedNumber({ value, suffix = '', style = {} }) {
  const [display, setDisplay] = React.useState(0);
  React.useEffect(() => {
    const dur = 300;
    const t0 = performance.now();
    const tick = (now) => {
      const p = Math.min((now - t0) / dur, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      setDisplay(Math.round(ease * value));
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [value]);
  return <div style={{ display: 'inline-block', whiteSpace: 'nowrap', ...style }}>{display.toLocaleString()}{suffix}</div>;
}

const EMBED_MODE = new URLSearchParams(window.location.search).get('embed') === '1';
if (EMBED_MODE) {
  document.documentElement.classList.add('embed');
  const s = document.createElement('style');
  s.textContent = 'html.embed, html.embed body { background: transparent !important; min-height: auto !important; }';
  document.head.appendChild(s);
}

function LandingPage() {
  const dummyNav = () => {};

  React.useEffect(() => {
    if (!EMBED_MODE || window.parent === window) return;
    const send = () => {
      const h = document.documentElement.scrollHeight;
      window.parent.postMessage({ type: 'proto-height', h }, '*');
    };
    const applyTheme = (theme) => {
      if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      else document.documentElement.removeAttribute('data-theme');
    };
    const onMsg = (e) => {
      if (e.data && e.data.type === 'theme') applyTheme(e.data.theme);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: 'proto-ready' }, '*');
    send();
    const ro = new ResizeObserver(send);
    ro.observe(document.documentElement);
    const onLoad = () => send();
    window.addEventListener('load', onLoad);
    const t = setInterval(send, 500);
    setTimeout(() => clearInterval(t), 3000);
    return () => {
      ro.disconnect();
      window.removeEventListener('load', onLoad);
      window.removeEventListener('message', onMsg);
      clearInterval(t);
    };
  }, []);

  return (
    <div style={{
      width: '100%', minHeight: EMBED_MODE ? 'auto' : '100vh',
      background: EMBED_MODE ? 'transparent' : 'var(--background-normal-alternative)',
      fontFamily: 'var(--font-family-base)', color: 'var(--label-normal)',
    }}>
      {!EMBED_MODE && (
        <header style={{
          padding: '64px 40px 48px', textAlign: 'center',
          background: 'var(--background-normal-normal)',
          borderBottom: '1px solid var(--line-normal-alternative)',
        }}>
          <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: '0.1em', color: 'var(--primary-normal)', marginBottom: 12 }}>SKT NEXT CHANNEL</div>
          <h1 style={{
            fontSize: 'var(--fs-display2)', fontWeight: 'var(--fw-bold-display)',
            letterSpacing: 'var(--ls-display2)', fontFamily: 'var(--font-family-display)',
            lineHeight: 'var(--lh-display2)', maxWidth: 720, margin: '0 auto',
          }}>
            신뢰 기반 셀프완결형<br />요금 납부·관리
          </h1>
          <p style={{ fontSize: 'var(--fs-body1)', color: 'var(--label-alternative)', marginTop: 16, maxWidth: 560, marginLeft: 'auto', marginRight: 'auto', lineHeight: 1.6 }}>
            청구·납부 정보를 고객 관점에서 재해석하고, 조회–납부–변경–예외 대응을 하나의 흐름으로 연결합니다.
          </p>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 24, marginTop: 32, flexWrap: 'wrap' }}>
            {['셀프완결', '의미 중심 설명', '예측형 관리', '가족·다회선'].map(t => (
              <span key={t} style={{
                padding: '6px 16px', borderRadius: 9999,
                background: 'var(--fill-normal)', fontSize: 'var(--fs-label1)',
                fontWeight: 500, color: 'var(--label-neutral)',
              }}>{t}</span>
            ))}
          </div>
        </header>
      )}

      <div style={{ maxWidth: 960, margin: '0 auto', padding: EMBED_MODE ? '0 24px' : '0 32px' }}>
        <CompareSection index={1}
          title="요금·납부 통합 허브"
          subtitle="분산 메뉴 → 통합 허브 진입"

          toBeContent={<Screen2_Hub nav={dummyNav} />}
        />
        <CompareSection index={2}
          title="현재 요금 상세 확인"

        </footer>
      )}
    </div>
  );
}
